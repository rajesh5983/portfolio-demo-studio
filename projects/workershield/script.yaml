title: "WorkerShield — Agentic RAG for Australian Workplace Compliance"
project: "workershield"
duration_target_seconds: 380  # 380 = ~6.5 min

segments:
  - id: 1
    label: "intro"
    recording_file: "01_intro.mp4"
    duration_seconds: 40
    narration: >
      WorkerShield is a production-grade agentic RAG system for Australian
      workplace compliance. Three specialist agents, one unified interface.
      Built on LangGraph, Qdrant, and Claude.

  - id: 2
    label: "safeshift_demo"
    recording_file: "02_safeshift.mp4"
    duration_seconds: 50
    narration: >
      A FIFO worker query spanning WHS duty of care and flexible working
      rights. Watch the router activate SafeShift and FairDesk
      simultaneously — then synthesise a cited response from both domains.

  - id: 3
    label: "fairdesk_demo"
    recording_file: "03_fairdesk.mp4"
    duration_seconds: 50
    narration: >
      Casual employee overtime on public holidays. FairDesk retrieves the
      relevant Fair Work Act provisions and surfaces the exact penalty rate
      obligations with source citations.

  - id: 4
    label: "healthnav_demo"
    recording_file: "04_healthnav.mp4"
    duration_seconds: 50
    narration: >
      Psychosocial hazards — one of the most complex areas of modern WHS
      law. HealthNav pulls the WHS Act obligations and synthesises
      actionable guidance.

  - id: 5
    label: "qdrant_demo"
    recording_file: "05_qdrant.mp4"
    duration_seconds: 40
    narration: >
      1,270 vectors across two index types — dense cosine for semantic
      search, sparse BM25 for keyword precision. Hybrid retrieval with RRF
      fusion runs on every query.

  - id: 6
    label: "phoenix_demo"
    recording_file: "06_phoenix.mp4"
    duration_seconds: 50
    narration: >
      Every query is traced end-to-end through Phoenix. Router, retrieval,
      reranker, synthesis — the full LangGraph execution chain, visible
      trace by trace.

  - id: 7
    label: "ragas_demo"
    recording_file: "07_ragas.mp4"
    duration_seconds: 45
    narration: >
      RAGAS evaluation across three retrieval configurations — dense-only,
      hybrid RRF, and hybrid with reranking. The reranked hybrid wins on
      context precision and faithfulness, the configuration that ships to
      production.

  - id: 8
    label: "mcp_wrap_demo"
    recording_file: "08_mcp_wrap.mp4"
    duration_seconds: 55
    narration: >
      The killer query. WorkerShield fires three nodes in parallel —
      SafeShift for fatigue obligations, HealthNav for WHS duties, and
      incident_check_node which calls the MCP server directly. The response
      combines live incident statistics from your internal database with
      document-grounded compliance obligations. This is RAG plus MCP tool
      use in a single LangGraph execution.
